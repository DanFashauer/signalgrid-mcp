name: Release

# Cut a GitHub Release (tag + notes) from the version in pyproject.toml. Run it
# from the Actions tab -> Release -> "Run workflow" after bumping the version: no
# local git, no manual tag/release step. Idempotent — re-running for a version
# that already has a release is a no-op. Notes come from the matching CHANGELOG.md
# section (falls back to auto-generated notes).
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: Test (gate the release on green tests)
        run: pytest -q
      - name: Resolve version + release notes
        id: meta
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re, tomllib
          version = tomllib.load(open("pyproject.toml", "rb"))["project"]["version"]
          print(f"tag=v{version}")
          notes = ""
          try:
              text = open("CHANGELOG.md", encoding="utf-8").read()
              for part in re.split(r"(?m)^## ", text):
                  lines = part.splitlines()
                  if lines and version in lines[0]:
                      notes = "## " + part.strip() + "\n"
                      break
          except FileNotFoundError:
              pass
          open("RELEASE_NOTES.md", "w", encoding="utf-8").write(notes)
          print("has_notes=1" if notes.strip() else "has_notes=0")
          PY
      - name: Create tag + GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists - nothing to do."
            exit 0
          fi
          if [ "${{ steps.meta.outputs.has_notes }}" = "1" ]; then
            gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --notes-file RELEASE_NOTES.md
          else
            gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --generate-notes
          fi
          echo "Published $TAG"
